<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda VIP - ValthCraft</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #050505;
    color: white;
}

header {
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('TU_IMAGEN_AQUI');
    height: 350px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

header h1 {
    font-size: 50px;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc;
}

.login-box {
    margin-top: 15px;
}

.login-box input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

.container {
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    background: linear-gradient(145deg, #111, #1c1c1c);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    border: 2px solid #222;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.07);
    box-shadow: 0 0 30px rgba(0,255,200,0.6);
}

.logo {
    width: 90px;
    height: 90px;
    margin-bottom: 10px;
}

.price {
    font-size: 22px;
    color: #00ffcc;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00c9a7;
}
</style>

<script>
function comprar(rango) {
    const user = document.getElementById('user').value;

    if(user === "") {
        alert("Pon tu usuario de Minecraft");
        return;
    }

    alert("Comprando " + rango + " para " + user);
}

function abrirInfo(rango) {
    window.open(rango + '.html', '_blank');
}
</script>

</head>
<body>

<header>
    <h1>⚔️ TIENDA VALTHCRAFT ⚔️</h1>

    <div class="login-box">
        <input type="text" id="user" placeholder="Tu nombre de Minecraft">
    </div>
</header>

<div class="container">

<div class="card" onclick="abrirInfo('vip')">
<img class="logo" src="TU_LOGO_VIP">
<h2>VIP</h2>
<div class="price">$3.99</div>
<button onclick="event.stopPropagation(); comprar('VIP')">Comprar</button>
</div>

<div class="card" onclick="abrirInfo('vipplus')">
<img class="logo" src="TU_LOGO_VIPPLUS">
<h2>VIP+</h2>
<div class="price">$7.99</div>
<button onclick="event.stopPropagation(); comprar('VIP+')">Comprar</button>
</div>

<div class="card" onclick="abrirInfo('elite')">
<img class="logo" src="TU_LOGO_ELITE">
<h2>ELITE</h2>
<div class="price">$10.99</div>
<button onclick="event.stopPropagation(); comprar('ELITE')">Comprar</button>
</div>

<div class="card" onclick="abrirInfo('titan')">
<img class="logo" src="TU_LOGO_TITAN">
<h2>TITAN</h2>
<div class="price">$25.99</div>
<button onclick="event.stopPropagation(); comprar('TITAN')">Comprar</button>
</div>

<div class="card" onclick="abrirInfo('legend')">
<img class="logo" src="TU_LOGO_LEGEND">
<h2>LEGEND</h2>
<div class="price">$50.99</div>
<button onclick="event.stopPropagation(); comprar('LEGEND')">Comprar</button>
</div>

<div class="card" onclick="abrirInfo('supremo')">
<img class="logo" src="TU_LOGO_SUPREMO">
<h2>SUPREMO</h2>
<div class="price">$99.99</div>
<button onclick="event.stopPropagation(); comprar('SUPREMO')">Comprar</button>
</div>

</div>

</body>
</html>
